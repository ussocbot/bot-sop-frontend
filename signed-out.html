<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex">
  <title>Signed Out | BOT SOP</title>
  <link rel="icon" href="assets/gear-favicon.svg" type="image/svg+xml">
  <style>
    :root { color-scheme: light; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    * { box-sizing: border-box; }
    body { display: grid; min-height: 100vh; margin: 0; place-items: center; padding: 24px; color: #10213d; background: radial-gradient(circle at 75% 15%, rgba(20,117,255,.2), transparent 32%), linear-gradient(145deg, #06152f, #0a2d60); }
    main { width: min(460px, 100%); padding: 42px; border: 1px solid rgba(255,255,255,.6); border-radius: 24px; background: rgba(255,255,255,.97); box-shadow: 0 28px 80px rgba(0,0,0,.3); text-align: center; }
    .status-icon { display: grid; width: 72px; height: 72px; margin: 0 auto 22px; place-items: center; border-radius: 50%; color: #15803d; background: #e8f8ee; }
    .status-icon svg { width: 38px; height: 38px; }
    h1 { margin: 0; font-size: 30px; line-height: 1.15; }
    p { margin: 14px 0 26px; color: #64748b; font-size: 15px; line-height: 1.6; }
    a { display: inline-flex; min-height: 46px; align-items: center; justify-content: center; padding: 11px 20px; border-radius: 11px; color: #fff; background: #075ee8; font-weight: 750; text-decoration: none; box-shadow: 0 10px 24px rgba(7,94,232,.25); }
    a:hover { background: #064fc1; }
    small { display: block; margin-top: 22px; color: #94a3b8; }
  </style>
</head>
<body>
  <main>
    <span class="status-icon" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </span>
    <h1>You’re signed out</h1>
    <p>Your BOT SOP session has ended successfully. Sign in again whenever you’re ready to return.</p>
    <a href="/api/auth/login">Sign in with Feishu</a>
    <small>You can safely close this window.</small>
  </main>
</body>
</html>
