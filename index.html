<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>BOT SOP</title>
  <link rel="stylesheet" href="css/styles.css?v=2026.07.13-v4.1">
</head>
<body>
  <header class="app-header">
    <button class="brand" type="button" onclick="showHome()" aria-label="BOT SOP home">
      <span class="brand__mark">BOT</span>
      <span>
        <strong>BOT SOP</strong>
        <small>Operational Guidance Center</small>
      </span>
    </button>

    <label class="header-search">
      <i data-lucide="search"></i>
      <input
        type="search"
        placeholder="Search processes, tools, and guidance…"
        aria-label="Search BOT SOP"
      >
    </label>

    <div class="header-actions">
      <a id="agent-assistant" class="assistant-link" href="#" hidden>
        <i data-lucide="bot"></i>
        Agent Assistant
      </a>

      <span class="build-version" title="Deployment build">
        Build 2026.07.13-v4.1
      </span>

      <span class="signed-in">
        <i data-lucide="user-round"></i>
        <span id="signed-in-user">Feishu user</span>
      </span>

      <a href="/api/auth/logout">Sign out</a>
    </div>
  </header>

  <div class="app-layout">
    <aside class="left-sidebar">
      <nav
        id="left-navigation"
        class="left-navigation"
        aria-label="Request types"
      ></nav>
    </aside>

    <main class="content">
      <section id="content-view" aria-live="polite"></section>
    </main>

    <aside
      id="right-rail"
      class="right-sidebar"
      aria-label="Resources and updates"
    ></aside>
  </div>

  <script src="https://lf1-cdn-tos.bytescm.com/obj/ttfe/ttfe-sdk/lark-js-sdk/1.0.0/lark-js-sdk.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/data.js?v=2026.07.13-v4.1"></script>
  <script src="js/components.js?v=2026.07.13-v4.1"></script>
  <script src="js/navigation.js?v=2026.07.13-v4.1"></script>
  <script src="js/app.js?v=2026.07.13-v4.1"></script>
</body>
</html>
