<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>BOT SOP</title>
  <link rel="stylesheet" href="css/styles.css?v=2026.07.16-v9">
</head>
<body>
  <header class="app-header">
    <button class="brand" type="button" onclick="showHome()" aria-label="BOT SOP home">
      <span class="brand__mark">BOT</span>
      <span><strong>BOT SOP</strong><small>Operational Guidance Center</small></span>
    </button>

    <div class="search-shell">
      <div class="header-search">
        <i data-lucide="search"></i>
        <input type="search" placeholder="Search SOP and Resources" aria-label="Search SOP and Resources">
        <button id="search-filter-toggle" class="search-filter-toggle" type="button" aria-label="Advanced search filters" aria-expanded="false" aria-controls="search-filter-popover">
          <i data-lucide="sliders-horizontal"></i>
          <span id="search-filter-badge" class="search-filter-badge" hidden>0</span>
        </button>
      </div>

      <div id="search-filter-popover" class="search-filter-popover" hidden>
        <header><strong>Advanced Search</strong><button type="button" id="search-filter-close" aria-label="Close filters"><i data-lucide="x"></i></button></header>
        <label>Search in
          <select id="filter-source">
            <option value="all">SOPs and Resources</option>
            <option value="sop">SOPs only</option>
            <option value="resource">Resources only</option>
          </select>
        </label>
        <label>Content type
          <select id="filter-content-type"><option value="all">All content types</option></select>
        </label>
        <label>Request type
          <select id="filter-request-type"><option value="all">All request types</option></select>
        </label>
        <label>Updated
          <select id="filter-updated">
            <option value="all">Any time</option>
            <option value="7">Past 7 days</option>
            <option value="30">Past 30 days</option>
            <option value="90">Past 90 days</option>
          </select>
        </label>
        <div class="search-filter-actions">
          <button type="button" id="search-filter-clear">Clear All</button>
          <button type="button" id="search-filter-apply" class="primary-action">Apply</button>
        </div>
      </div>
    </div>

    <div class="header-actions">
      <a id="submit-resource" class="submit-resource-button" href="#" target="_blank" rel="noopener noreferrer" hidden><i data-lucide="circle-plus"></i> Submit Resource</a>
      <a id="agent-assistant" class="assistant-link" href="#" hidden><i data-lucide="bot"></i> Agent Assistant</a>
      <span class="build-version" title="Deployment build">Build 2026.07.16-v9</span>
      <span class="signed-in"><i data-lucide="user-round"></i><span id="signed-in-user">Feishu user</span></span>
      <a href="/api/auth/logout">Sign out</a>
    </div>
  </header>

  <div class="app-layout">
    <aside class="left-sidebar">
      <nav id="left-navigation" class="left-navigation" aria-label="Request types"></nav>
    </aside>
    <main class="content"><section id="content-view" aria-live="polite"></section></main>
    <aside id="right-rail" class="right-sidebar" aria-label="Resources and updates"></aside>
  </div>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script src="js/data.js?v=2026.07.16-v9"></script>
  <script src="js/components.js?v=2026.07.16-v9"></script>
  <script src="js/navigation.js?v=2026.07.16-v9"></script>
  <script src="js/app.js?v=2026.07.16-v9"></script>
</body>
</html>
